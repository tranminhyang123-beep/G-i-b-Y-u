<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gửi Bé Yêu ❤️</title>
<style>
    body{
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg,#ff9a9e,#fad0c4);
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        margin:0;
        text-align:center;
    }
    .card{
        background:white;
        padding:30px;
        border-radius:20px;
        box-shadow:0 5px 15px rgba(0,0,0,0.2);
        max-width:400px;
    }
    h1{
        color:#ff4d6d;
    }
    p{
        font-size:18px;
        line-height:1.6;
    }
</style>
</head>
<body>
    <div class="card">
        <h1>💖 Bé yêu ơi 💖</h1>
        <p>Anh yêu bé nhiều lắm ❤️</p>
        <p>Anh nhớ bé nhiều lắm đấy bé có biết hong nè 🥺</p>
        <p>Hong biết bé có nhớ tới anh hong jaaa 💕</p>
    </div>
</body>
</html>
